const INSIGHTS = {"食品": "食品赛道的情绪结构高度分散，快乐（~45%）始终占据主导，但不同品牌之间情绪差异化程度最为显著——这也意味着情绪是食品品牌最有效的差异化武器之一。零食品类普遍在「钦慕感」和「启迪感」上获得高 TGI，背后是开箱惊喜、猎奇新品、种草发现等内容驱动；而方便速食类品牌（白象、日清、农心）则在「希望感」和「快乐」上表现更稳，折射出情感慰藉、治愈日常的消费叙事。值得关注的是，老字号和亚洲品牌（旺旺、大白兔、嘉华鲜花饼）在「依赖感」和「谢意」上 TGI 显著偏高，说明情感联结与礼赠场景是其最核心的情绪资产，品牌做内容时应优先强化这一路线，而非盲目追逐快乐或惊讶的通用叙事。", "饮料": "饮料赛道是四个赛道中情绪最为多元的：快乐依然是基础底色，但「自我实现感」和「释放感」的战略价值远超其他赛道。农夫山泉（TGI=253）、三得利（TGI=333）、POSITIVE HOTEL（TGI=401）在「自我实现感」上的高度集中，揭示了一个清晰的消费趋势——饮料正在从解渴工具转型为悦己生活方式的符号。可口可乐在「启迪感」上异常突出（TGI=201），这与其长期的品牌故事投资高度一致。而星巴克、COSTA 等咖啡品牌则在「爱意」上保持稳定优势，社交货币与情感归属是其持续复购的情绪引擎。对饮料品牌而言，「快乐」只是入场券，「自我实现感」和「爱意」才是能真正拉开差距的情绪赛点。", "酒水": "酒水赛道的情绪图谱呈现出两极分化的格局：白酒（茅台、五粮液、泸州老窖）高度聚集于「谢意」「信任感」「希望感」，这三种情绪共同构成中国礼赠文化的情绪底座，也是白酒内容营销不可撼动的护城河；啤酒品牌（青岛、雪花、喜力）则在「快乐」「依赖感」「释放感」上更为突出，对应的是聚会、消遣、当下享乐的轻松叙事。最值得白皮书重点分析的是雪花（「自我实现感」TGI=239、「启迪感」TGI=238）和燕京（「自在感」TGI=414）——前者依托「勇闯天涯」IP沉淀了大量探索与成就感内容，后者则走出了差异化的「随性清爽」路线，证明即便在传统白酒和大众啤酒之间，情绪差异化仍有足够的操作空间。", "乳制品": "乳制品是四个赛道中情绪分层最为清晰的：奶粉品牌（飞鹤、APTAMIL、a2、爱他美）与成人乳品品牌（伊利、蒙牛、安慕希、安佳）呈现出截然不同的情绪图谱。飞鹤以「谢意」（TGI=443）和「信任感」（TGI=396）独占高位，这是母婴品牌「妈妈放心托付」情感逻辑的直接映射；而安佳、a2 等进口品牌则在「自在感」上异常集中（安佳 TGI=338、a2 TGI=311），反映出精致悦己生活方式的消费叙事。蒙牛在「启迪感」上的 TGI 同样值得关注——大量科普健康、功能成分解读类内容正在重塑消费者对国产乳品的认知框架。整体来看，乳制品赛道的情绪分层为品牌提供了清晰的内容差异化路线图：奶粉品牌守好「信任」，成人乳品抢占「悦己」，健康功能线拓展「启迪」。"};

function tgiStyle(v) {
  if (v===null||v===undefined) return {bg:'#0d0f1a',text:'#2d3148'};
  if (v>=400) return {bg:'#3b0764',text:'#f5f3ff'};
  if (v>=300) return {bg:'#5b21b6',text:'#f5f3ff'};
  if (v>=220) return {bg:'#4f46e5',text:'#fff'};
  if (v>=180) return {bg:'#1d4ed8',text:'#fff'};
  if (v>=150) return {bg:'#0369a1',text:'#e0f2fe'};
  if (v>=130) return {bg:'#047857',text:'#a7f3d0'};
  if (v>=115) return {bg:'#065f46',text:'#6ee7b7'};
  if (v>=100) return {bg:'#1e3a2f',text:'#6ee7b7'};
  if (v>=80)  return {bg:'#1e2130',text:'#6b7280'};
  return            {bg:'#14161f',text:'#4b5563'};
}

const lb=document.getElementById('legendBar');
[55,72,88,105,120,138,158,185,230,310].forEach(v=>{
  const d=document.createElement('div'); const s=tgiStyle(v);
  d.style.background=s.bg; lb.appendChild(d);
});

const container=document.getElementById('charts');
TRACK_ORDER.forEach(track=>{
  const brands=TRACKS[track], emos=TRACK_EMO_ORDER[track];
  const section=document.createElement('div'); section.className='section';

  // 赛道标题 + 洞察
  const sHeader=document.createElement('div'); sHeader.className='section-header';
  const stitle=document.createElement('div'); stitle.className='section-title';
  stitle.innerHTML='<span class="tag">TRACK</span>'+track+' 赛道';
  const insightDiv=document.createElement('div'); insightDiv.className='insight';
  const insightText=INSIGHTS[track]||'';
  // 高亮 TGI 数字
  insightDiv.innerHTML=insightText.replace(/(TGI[=＝][\d,]+)/g,'<em>$1</em>');
  sHeader.appendChild(stitle); sHeader.appendChild(insightDiv);
  section.appendChild(sHeader);

  const wrap=document.createElement('div'); wrap.className='heatmap-wrap';
  const table=document.createElement('table');
  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  const th0=document.createElement('th'); th0.className='emo-col'; th0.textContent='情绪'; hr.appendChild(th0);
  brands.forEach(b=>{ const th=document.createElement('th'); th.textContent=b; hr.appendChild(th); });
  thead.appendChild(hr); table.appendChild(thead);
  const tbody=document.createElement('tbody');
  emos.forEach(emo=>{
    const tr=document.createElement('tr');
    const td0=document.createElement('td'); td0.className='emo-cell'; td0.textContent=emo; tr.appendChild(td0);
    brands.forEach(brand=>{
      const td=document.createElement('td');
      const v=(TGI_DATA[brand]&&TGI_DATA[brand][emo])?TGI_DATA[brand][emo]:null;
      const s=tgiStyle(v);
      const cell=document.createElement('div'); cell.className='cell';
      cell.style.background=s.bg; cell.style.color=s.text;
      cell.textContent=v!==null?Math.round(v):'-';
      cell.title=brand+' · '+emo+'\nTGI = '+(v!==null?v:'N/A');
      td.appendChild(cell); tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrap.appendChild(table);
  section.appendChild(wrap); container.appendChild(section);
});
</script>
</body>
</html>
